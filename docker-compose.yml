version: '3.8'

services:
  # Base de datos MySQL 8.0
  db:
    image: mysql:8.0
    container_name: mysql-db
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: users_db
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Node.js
  backJs:
    image: eft-backjs-local:latest  # <-- CORRECCIÓN: Fuerza nombre en minúsculas
    build:
      context: ./backJs
      dockerfile: Dockerfile
    container_name: backend-api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: users_db
      PORT: 8081  
    ports:
      - "8081:8081" 
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net

  # Frontend Nginx
  Front:
    image: eft-front-local:latest  # <-- CORRECCIÓN: Fuerza nombre en minúsculas
    build:
      context: ./Front
      dockerfile: Dockerfile
    container_name: frontend-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - frontend-net
    depends_on:
      - backJs

  # Backend API Python Flask
  BackPy:
    image: eft-backpy-local:latest  # <-- CORRECCIÓN: Fuerza nombre en minúsculas
    build:
      context: ./BackPy
      dockerfile: Dockerfile
    container_name: backend-python
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: products_db
    ports:
      - "8082:8082"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net

# Volúmenes persistentes
volumes:
  mysql-data:
    driver: local

# Redes aisladas
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true
