name: CI-CD Pipeline - EFT DevOps

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codigo fuente
      uses: actions/checkout@v3

    - name: Configurar entorno de Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Iniciar sesion en Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir y Publicar Imagen del Backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/eft-backend:latest

    - name: Construir y Publicar Imagen del Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/eft-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Simulacion de Despliegue
      run: |
        echo "¡Despliegue automatizado completado con exito!"
